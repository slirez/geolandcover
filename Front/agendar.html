<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agendar Cita - Gest LandCover</title>
    <link rel="stylesheet" href="styles.css">
   <style>
    /* ==========================================================================
       ENCABEZADO DE LA AGENDA
       ========================================================================== */
    /* Contenedor blanco del header */
    .white-header-agenda { 
        background: white; 
        padding: 10px 0; 
        border-bottom: 2px solid #ccc; 
        display: flex; 
        justify-content: center; 
        align-items: center; 
    }

    /* Envoltura interna para alinear el logo y el título */
    .header-content-wrapper { 
        display: flex; 
        align-items: center; 
        gap: 20px; 
    }

    /* ==========================================================================
       ESTRUCTURA DEL CALENDARIO (GRID)
       ========================================================================== */
    /* Rejilla principal del calendario: 7 columnas para los días de la semana */
    .calendar-grid { 
        display: grid; 
        grid-template-columns: repeat(7, 1fr); 
        text-align: center; 
        border: 1px solid #eee; 
        background: white; 
    }

    /* Celdas superiores con los nombres de los días (SUN, MON, etc.) */
    .day-name { 
        font-weight: bold; 
        padding: 10px; 
        background: #f8f9fa; 
        border: 0.5px solid #ddd; 
        font-size: 0.9rem; 
    }

    /* Celda base para los números de los días */
    .day-num { 
        padding: 15px; 
        cursor: pointer; 
        border: 0.5px solid #eee; 
        min-height: 50px; 
        position: relative; 
    }

    /* ==========================================================================
       ESTADOS DE LOS DÍAS DEL CALENDARIO
       ========================================================================== */
    /* Días futuros disponibles para agendar */
    .day-num.available { 
        color: #007bff; 
        font-weight: bold; 
    } 

    /* Días pasados (deshabilitados y bloqueados) */
    .day-num.past { 
        color: #ccc; 
        cursor: not-allowed; 
        pointer-events: none; /* Evita que responda a los clics */
    } 

    /* Día seleccionado actualmente por el usuario (Círculo azul) */
    .day-num.selected { 
        background: #007bff !important; 
        color: white !important; 
        border-radius: 50%; 
    }

    /* Recuadro indicador para el día de hoy */
    .day-num.today { 
        border: 2px solid #1b365d; 
    }

    /* Celdas vacías al inicio/fin del mes para ajustar el desfase de días */
    .day-num.empty { 
        cursor: default; 
        border: none; 
    }

    /* Botones de navegación para cambiar de mes (◀ y ▶) */
    .nav-btn { 
        cursor: pointer; 
        user-select: none; 
        padding: 5px 15px; 
        background: #1b365d; 
        color: white; 
        border-radius: 5px; 
    }

    /* Botón de navegación deshabilitado (límite de meses alcanzado) */
    .nav-btn.disabled { 
        background: #ccc; 
        cursor: not-allowed; 
        opacity: 0.5; 
    }

    /* ==========================================================================
       LEYENDA DE DISPONIBILIDAD
       ========================================================================== */
    /* Contenedor inferior de la leyenda */
    .availability-legend { 
        margin-top: 15px; 
        padding: 10px; 
        display: flex; 
        flex-direction: column; 
        gap: 8px; 
        border-top: 1px solid #eee; 
    }

    /* Ítem individual de la leyenda (Cuadro + Texto) */
    .legend-item { 
        display: flex; 
        align-items: center; 
        gap: 10px; 
        font-weight: bold; 
        font-size: 1rem; 
    }

    /* Indicador cuadrado azul (Día Disponible) */
    .box-blue { 
        width: 20px; 
        height: 20px; 
        background-color: #007bff; 
    }

    /* Indicador cuadrado gris (No Disponible) */
    .box-gray { 
        width: 20px; 
        height: 20px; 
        background-color: #ccc; 
    }

    /* ==========================================================================
       BLOQUES DE HORARIOS (TIME SLOTS)
       ========================================================================== */
    /* Estado cuando un bloque horario ya está ocupado en la Base de Datos */
    .time-slot.disabled-slot { 
        opacity: 0.5; 
        pointer-events: none; 
        cursor: not-allowed; 
    }

    /* Modificadores del botón interno cuando el horario está bloqueado */
    .time-slot.disabled-slot .time-btn { 
        background: #ccc !important; 
        color: #777 !important; 
        border-color: #aaa !important; 
    }

    /* PIE DE PÁGINA (DIRECCIÓN Y CONFIRMACIÓN)*/
    /* Barra inferior que contiene la dirección y el botón de confirmación */
    .agenda-footer { 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        gap: 20px; 
        width: 100%; 
        box-sizing: border-box; 
    }

    /* Área del input de la dirección del proyecto (toma más espacio) */
    .address-area { 
        flex: 2 !important; /* Prioriza y expande esta sección frente al botón */
        display: flex; 
        align-items: center; 
    }
</style>
</head>
<body class="frame-body">
    <div class="main-window">
        <header class="white-header-agenda">
            <div class="header-content-wrapper">
                <img src="imagenproye.png" alt="Logo" class="logo-img-header" style="flex-shrink: 0;">
                <h1 style="text-align: center; font-size: 2.8rem; margin: 0; font-family: 'Arial Narrow', sans-serif; line-height: 1.1;">
                    Agendar Cita Del Servicio:<br><span id="servicio-titulo">Servicios Con SIG</span>
                </h1>
            </div>
        </header>

        <main class="content">
            <div class="agenda-layout">
                <div class="agenda-card">
                    <h3>Calendario De Disponibilidad</h3>
                    <div class="calendar-header" style="display: flex; justify-content: space-between; align-items: center; background: #b7c9d9; padding: 10px; border-radius: 5px 5px 0 0;">
                        <span id="prevMonth" class="nav-btn">◀</span>
                        <span id="monthDisplay" style="font-weight: bold; font-size: 1.2rem;"></span>
                        <span id="nextMonth" class="nav-btn">▶</span>
                    </div>
                    <div class="calendar-grid" id="calendarGrid"></div>

                    <div class="availability-legend">
                        <div class="legend-item"><div class="box-blue"></div><span>Día disponible</span></div>
                        <div class="legend-item"><div class="box-gray"></div><span>No disponible</span></div>
                    </div>
                </div>

                <div class="agenda-card">
                    <h3>Horarios Disponibles</h3>
                    <div id="scheduleList">
                        <div class="time-slot" data-hora="6:00 AM - 9:00 AM" onclick="selectSlot(this, '6:00 AM - 9:00 AM')"><div class="radio-circle"></div><button class="time-btn">6:00 AM - 9:00 AM</button></div>
                        <div class="time-slot" data-hora="9:00 AM - 12:00 PM" onclick="selectSlot(this, '9:00 AM - 12:00 PM')"><div class="radio-circle"></div><button class="time-btn">9:00 AM - 12:00 PM</button></div>
                        <div class="time-slot" data-hora="12:00 PM - 3:00 PM" onclick="selectSlot(this, '12:00 PM - 3:00 PM')"><div class="radio-circle"></div><button class="time-btn">12:00 PM - 3:00 PM</button></div>
                        <div class="time-slot" data-hora="3:00 PM - 6:00 PM" onclick="selectSlot(this, '3:00 PM - 6:00 PM')"><div class="radio-circle"></div><button class="time-btn">3:00 PM - 6:00 PM</button></div>
                        <div class="time-slot" data-hora="6:00 PM - 9:00 PM" onclick="selectSlot(this, '6:00 PM - 9:00 PM')"><div class="radio-circle"></div><button class="time-btn">6:00 PM - 9:00 PM</button></div>
                        <div class="time-slot" data-hora="9:00 PM - 12:00 AM" onclick="selectSlot(this, '9:00 PM - 12:00 AM')"><div class="radio-circle"></div><button class="time-btn">9:00 PM - 12:00 AM</button></div>
                    </div> 
                    <p style="background:#b7c9d9; padding:10px; text-align:center; border:1px solid #999; margin-top:20px; font-size: 0.9rem;">
                        Selecciona Una Fecha Y Un Horario Disponible Para Agendar Tu Cita
                    </p>
                </div>
            </div>

            <div class="agenda-footer">
                <div class="address-area">
                    <strong>Dirección:</strong>
                    <input type="text" id="agenda-direccion" placeholder="Ingresa tu dirección completa..." style="border:none; background:transparent; flex:1; font-size:1.2rem; padding-left: 10px;">
                </div>
                <button class="btn-confirm-agenda" onclick="confirmarCita()">Confirmar cita</button>
            </div>
        </main>
    </div>

    <script>
        const monthDisplay = document.getElementById('monthDisplay');
        const calendarGrid = document.getElementById('calendarGrid');
        const prevBtn = document.getElementById('prevMonth');
        const nextBtn = document.getElementById('nextMonth');

        const baseDate = new Date();
        let date = new Date(); 

        const months = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
        const API_CITAS_URL = 'http://localhost:3000/api/citas';

        /**
         * Interroga la API buscando conflictos de asignación horaria para deshabilitar nodos visuales ocupados
         * @param {string} fechaSeleccionada - Cadena descriptiva del día evaluado
         */
        async function actualizarHorariosDisponibles(fechaSeleccionada) {
            let citasOcupadas = [];
            try {
                // Descarga de las colecciones de tuplas persistidas en tablas de base de datos
                const respuesta = await fetch(API_CITAS_URL);
                if (respuesta.ok) {
                    citasOcupadas = await respuesta.json();
                }
            } catch (err) {
                console.warn("Fallo de API al recuperar cruces, recurriendo a contingencia integrada.", err);
                citasOcupadas = JSON.parse(localStorage.getItem('bd_citas_globales')) || [];
            }
            
            document.querySelectorAll('.time-slot').forEach(slot => {
                const horaSlot = slot.getAttribute('data-hora');
                
                // Mapea cruzando si la base de datos ya posee ocupación concurrente en ese nodo temporal
                const estaOcupado = citasOcupadas.some(cita => 
                    (cita.fecha_cita === fechaSeleccionada || cita.fecha === fechaSeleccionada) && 
                    (cita.horario_cita === horaSlot || cita.hora === horaSlot)
                );
                
                if (estaOcupado) {
                    slot.classList.add('disabled-slot');
                    slot.querySelector('.radio-circle').classList.remove('active');
                    slot.querySelector('.time-btn').classList.remove('selected');
                } else {
                    slot.classList.remove('disabled-slot');
                }
            });
        }

        function renderCalendar() {
            calendarGrid.innerHTML = "";
            const year = date.getFullYear();
            const month = date.getMonth();
            monthDisplay.innerText = `${months[month]} ${year}`;

            const diffMonths = (year - baseDate.getFullYear()) * 12 + (month - baseDate.getMonth());
            prevBtn.classList.toggle('disabled', diffMonths <= 0);
            nextBtn.classList.toggle('disabled', diffMonths >= 3);

            const daysHead = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"];
            daysHead.forEach(d => {
                const head = document.createElement('div');
                head.className = "day-name"; head.innerText = d;
                calendarGrid.appendChild(head);
            });

            const firstDay = new Date(year, month, 1).getDay();
            const lastDay = new Date(year, month + 1, 0).getDate();
            const today = new Date(); today.setHours(0,0,0,0);

            for (let i = 0; i < firstDay; i++) {
                const empty = document.createElement('div');
                empty.className = "day-num empty";
                calendarGrid.appendChild(empty);
            }

            for (let i = 1; i <= lastDay; i++) {
                const dayEl = document.createElement('div');
                const checkDate = new Date(year, month, i);
                dayEl.className = "day-num"; dayEl.innerText = i;

                if (checkDate.getTime() === today.getTime()) dayEl.classList.add('today');

                if (checkDate < today) {
                    dayEl.classList.add('past');
                } else {
                    dayEl.classList.add('available');
                    dayEl.onclick = () => {
                        document.querySelectorAll('.day-num').forEach(d => d.classList.remove('selected'));
                        dayEl.classList.add('selected');
                        const cadenaFecha = `${i} de ${months[month]} ${year}`;
                        localStorage.setItem('cita_fecha', cadenaFecha);
                        actualizarHorariosDisponibles(cadenaFecha);
                    };
                }
                calendarGrid.appendChild(dayEl);
            }
        }

        prevBtn.onclick = () => {
            const currentDiff = (date.getFullYear() - baseDate.getFullYear()) * 12 + (date.getMonth() - baseDate.getMonth());
            if (currentDiff > 0) { date.setMonth(date.getMonth() - 1); renderCalendar(); }
        };

        nextBtn.onclick = () => {
            const currentDiff = (date.getFullYear() - baseDate.getFullYear()) * 12 + (date.getMonth() - baseDate.getMonth());
            if (currentDiff < 3) { date.setMonth(date.getMonth() + 1); renderCalendar(); }
        };

        function selectSlot(el, hora) {
            if (el.classList.contains('disabled-slot')) return;
            document.querySelectorAll('.radio-circle').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('selected'));
            el.querySelector('.radio-circle').classList.add('active');
            el.querySelector('.time-btn').classList.add('selected');
            localStorage.setItem('cita_hora', hora);
        }

        /**
         * Recopila el estado completo de la cita y efectúa la inserción de datos relacionales
         */
        function confirmarCita() {
            const fecha = localStorage.getItem('cita_fecha');
            const hora = localStorage.getItem('cita_hora');
            const direccion = document.getElementById('agenda-direccion').value.trim();

            if (!fecha || !hora) {
                alert("Por favor selecciona una fecha y un horario en el calendario.");
                return;
            }
            if (!direccion) {
                alert("Por favor, introduce una dirección válida para continuar con tu proyecto.");
                return; 
            }

            localStorage.setItem('cita_direccion', direccion);
            // Salto inequívoco a la interfaz de impresión de comprobantes
            window.location.href = 'confirmacion.html';
        }

        const servicioSeleccionado = localStorage.getItem('servicioActual');
        if (servicioSeleccionado) {
            document.getElementById('servicio-titulo').innerText = servicioSeleccionado;
        }

        renderCalendar();
    </script>
</body>
</html>
